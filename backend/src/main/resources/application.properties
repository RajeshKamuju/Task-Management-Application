# Server Port Configuration
server.port=8080

# Spring Application Name
spring.application.name=task-manager

# Database Connection (MySQL Config)
spring.datasource.url=jdbc:mysql://localhost:3306/task_manager_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Custom JWT Application Configurations
app.jwt.secret=9aDf87v0a12eG89h56jkR43lM78oPn90qR12sT34uV56wX78yZ90aBcdEfGHiJkLmNoPQ
# Token Expiration: 24 hours (86,400,000 milliseconds)
app.jwt.expiration-milliseconds=86400000
